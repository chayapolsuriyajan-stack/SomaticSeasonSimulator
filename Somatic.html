function App() {
  const [lang, setLang] = useState('en'); // Defaults to English
  const [latitude, setLatitude] = useState(40.7);
  const [dayOfYear, setDayOfYear] = useState(172); // Default to June Solstice (~June 21)
  const [axialTilt, setAxialTilt] = useState(23.5);
  const [timeOfDay, setTimeOfDay] = useState(12.0); // Decimal hours (0-24)
  const [isCelsius, setIsCelsius] = useState(true);
  const [isPlaying, setIsPlaying] = useState(false);
  const [playSpeed, setPlaySpeed] = useState(1); // 1 = 1 day per frame, 2 = 5 days, 3 = 10 days
  const [activeTab, setActiveTab] = useState('simulation'); // 'simulation' | 'science'
  const [isTimePlaying, setIsTimePlaying] = useState(false);
  // Help guide: opens automatically on the very first visit (localStorage may be
  // unavailable when opened as a plain file, so fail closed instead of crashing)
  const [showHelp, setShowHelp] = useState(() => {
    try {
      return !window.localStorage.getItem('somatic-help-seen');
    } catch (err) {
      return false;
    }
  });
  const closeHelp = () => {
    setShowHelp(false);
    try {
      window.localStorage.setItem('somatic-help-seen', '1');
    } catch (err) { /* ignore */ }
  };

  const t = (key) => TRANSLATIONS[lang][key] || key;
  const monthNames = lang === 'en' ? MONTH_NAMES_EN : MONTH_NAMES_TH;

  useEffect(() => {
    let intervalId;
    if (isPlaying) {
      const step = playSpeed === 1 ? 1 : playSpeed === 2 ? 3 : 7;
      intervalId = setInterval(() => {
        setDayOfYear((prev) => {
          const next = prev + step;
          return next > 365 ? next - 365 : next;
        });
      }, 50);
    }
    return () => clearInterval(intervalId);
  }, [isPlaying, playSpeed]);

  useEffect(() => {
    let intervalId;
    if (isTimePlaying) {
      intervalId = setInterval(() => {
        setTimeOfDay((prev) => {
          const next = prev + 0.25;
          return next >= 24 ? 0 : next;
        });
      }, 50);
    }
    return () => clearInterval(intervalId);
  }, [isTimePlaying]);

  // Convert Day of Year to Month & Day
  const dateInfo = useMemo(() => {
    let remainingDays = dayOfYear;
    let monthIdx = 0;
    while (monthIdx < 12 && remainingDays > MONTH_DAYS[monthIdx]) {
      remainingDays -= MONTH_DAYS[monthIdx];
      monthIdx++;
    }
    if (monthIdx === 12) {
      monthIdx = 11;
      remainingDays = 31;
    }
    return {
      month: monthNames[monthIdx],
      day: Math.floor(remainingDays) || 1,
      monthIndex: monthIdx
    };
  }, [dayOfYear, lang]);

  const physics = useMemo(() => {
    const rad = Math.PI / 180;
    const dayAngle = (360 / 365) * (dayOfYear - 80) * rad;
    const declination = axialTilt * Math.sin(dayAngle);

    const latRad = latitude * rad;
    const decRad = declination * rad;

    let cosHourAngle = -Math.tan(latRad) * Math.tan(decRad);
    
    let dayLength = 0;
    let isPolarDay = false;
    let isPolarNight = false;

    if (cosHourAngle <= -1) {
      dayLength = 24;
      isPolarDay = true;
    } else if (cosHourAngle >= 1) {
      dayLength = 0;
      isPolarNight = true;
    } else {
      const hourAngle = Math.acos(Math.max(-1, Math.min(1, cosHourAngle))) / rad;
      dayLength = (2 * hourAngle) / 15;
    }

    let maxSolarElevation = 90 - Math.abs(latitude - declination);
    if (maxSolarElevation < 0) maxSolarElevation = 0;

    const hourAngleCurrent = (timeOfDay - 12) * 15 * rad;
    let sinElevation = Math.sin(latRad) * Math.sin(decRad) + Math.cos(latRad) * Math.cos(decRad) * Math.cos(hourAngleCurrent);
    
    // Avoid precision errors producing NaN (Clamped trig input)
    // trueSolarElevation keeps its sign (negative = sun below the horizon) so the
    // landscape can render dusk, dawn, and night skies smoothly.
    const trueSolarElevation = Math.asin(Math.max(-1, Math.min(1, sinElevation))) / rad;
    const currentSolarElevation = Math.max(0, trueSolarElevation);

    const rawInsolation = 1361 * Math.sin(currentSolarElevation * rad);
    const solarIntensity = Math.max(0, rawInsolation); // Top-of-atmosphere (TOA) flux

    // Simple clear-sky atmosphere model: the lower the sun, the longer the light's
    // path through the air ("air mass"), and the more energy is absorbed/scattered.
    // Air mass via Kasten & Young (1989); transmittance ≈ 0.7^(AM^0.678).
    let surfaceIntensity = 0;
    if (currentSolarElevation > 0) {
      const airMass = 1 / (
        Math.sin(currentSolarElevation * rad) +
        0.50572 * Math.pow(currentSolarElevation + 6.07995, -1.6364)
      );
      surfaceIntensity = solarIntensity * Math.pow(0.7, Math.pow(airMass, 0.678));
    }

    const dailyInsolationFactor = (dayLength / 24) * Math.sin(maxSolarElevation * rad);

    const laggedDayAngle = (360 / 365) * (dayOfYear - 110) * rad; 
    const laggedDeclination = axialTilt * Math.sin(laggedDayAngle);
    
    const equatorTemp = 28; 
    const poleTemp = -35; 
    const latFactor = Math.cos(latRad); 
    
    let baseTemp = poleTemp + (equatorTemp - poleTemp) * Math.pow(latFactor, 1.5);
    const seasonAmplitude = 25 * (1 - latFactor * 0.4); 
    const seasonalSwing = (laggedDeclination / axialTilt) * seasonAmplitude * (latitude >= 0 ? 1 : -1);
    // Day/night temperature swing shrinks toward the poles (latFactor = cos(latitude))
    const diurnalSwing = 8 * latFactor * Math.sin(((timeOfDay - 14) / 24) * 2 * Math.PI);

    let currentTemp = baseTemp + seasonalSwing + diurnalSwing;
    currentTemp = Math.max(-89.2, Math.min(58, currentTemp)); 

    // Seeded Weather state key (Uses a seasonal sine wave instead of Math.random to avoid flickering)
    const seed = Math.sin(dayOfYear * rad) + Math.cos(latitude * rad);
    let weatherKey = "clearSky";
    let icon = "sun";
    
    if (currentTemp < 0) {
      if (Math.abs(latitude) > 60 && currentTemp < -15) {
        weatherKey = "blizzard";
        icon = "snow-heavy";
      } else {
        weatherKey = "snowLight";
        icon = "snow";
      }
    } else if (currentTemp > 35) {
      weatherKey = "extremeHeat";
      icon = "heat";
    } else {
      const isEquatorialRainy = Math.abs(latitude) < 10;
      // Monsoon rains come when the sun stands high over YOUR hemisphere (wet
      // season), not at both solstices — so Bangkok is rainy in June, dry in December.
      const towardSunDec = latitude >= 0 ? declination : -declination;
      const isMonsoonSeason = isEquatorialRainy || (Math.abs(latitude) < 25 && towardSunDec > 15);
      
      if (isMonsoonSeason) {
        weatherKey = "tropicalShowers";
        icon = "rain-heavy";
      } else if (seed > 0.6) {
        weatherKey = "passingClouds";
        icon = "cloudy";
      } else if (seed < -0.8) {
        weatherKey = "scatteredShowers";
        icon = "rain";
      } else {
        weatherKey = "pleasantSunny";
        icon = "clear";
      }
    }

    return {
      declination,
      dayLength,
      isPolarDay,
      isPolarNight,
      maxSolarElevation,
      currentSolarElevation,
      trueSolarElevation,
      solarIntensity,
      surfaceIntensity,
      dailyInsolationFactor,
      currentTemp,
      weather: TRANSLATIONS[lang].weather[weatherKey],
      icon
    };
  }, [latitude, dayOfYear, axialTilt, timeOfDay, lang]);

  // Helper to convert Temp
  const formatTemp = (celsius) => {
    if (isCelsius) {
      return `${celsius.toFixed(1)}°C`;
    } else {
      const fahrenheit = (celsius * 9) / 5 + 32;
      return `${fahrenheit.toFixed(1)}°F`;
    }
  };

  // Month-based season for a whole hemisphere (also drives the globe's colored bands)
  const hemisphereSeasonKey = (isNorth) => {
    const month = dateInfo.monthIndex;
    if (month >= 11 || month <= 1) {
      return isNorth ? "Winter" : "Summer";
    } else if (month >= 2 && month <= 4) {
      return isNorth ? "Spring" : "Autumn";
    } else if (month >= 5 && month <= 7) {
      return isNorth ? "Summer" : "Winter";
    } else {
      return isNorth ? "Autumn" : "Spring";
    }
  };

  // Determine season label based on latitude and month
  const getSeasonKey = () => {
    const isNorth = latitude >= 0;

    if (Math.abs(latitude) < 15) {
      const decRatio = physics.declination;
      if (isNorth) {
        return decRatio > 8 ? "WetHigh" : "DryLow";
      } else {
        return decRatio < -8 ? "WetHigh" : "DryLow";
      }
    }

    return hemisphereSeasonKey(isNorth);
  };

  const activeSeasonKey = getSeasonKey();
  const seasonLabel = TRANSLATIONS[lang].seasons[activeSeasonKey];

  return (
    <div className="min-h-screen bg-slate-950 text-slate-100 flex flex-col font-sans selection:bg-teal-500 selection:text-white">
      {/* Global keyframes for ambient motion (CSS-only — cheap on the GPU). */}
      <style>{`
        @keyframes drift { 0%, 100% { transform: translateX(-2.5%); } 50% { transform: translateX(2.5%); } }
        @keyframes fallSnow {
          0%   { transform: translateY(-20px) translateX(0); opacity: 0; }
          8%   { opacity: 0.95; }
          25%  { transform: translateY(70px) translateX(16px); }
          50%  { transform: translateY(160px) translateX(-12px); opacity: 0.95; }
          75%  { transform: translateY(250px) translateX(10px); }
          100% { transform: translateY(340px) translateX(-6px); opacity: 0.4; }
        }
        @keyframes fallLeaf {
          0%   { transform: translateY(-20px) translateX(0) rotate(0deg); opacity: 0; }
          10%  { opacity: 0.9; }
          60%  { transform: translateY(180px) translateX(24px) rotate(200deg); opacity: 0.9; }
          100% { transform: translateY(330px) translateX(-8px) rotate(340deg); opacity: 0; }
        }
        @keyframes rainFall {
          0%   { transform: translate(0, -30px) rotate(9deg); opacity: 0; }
          15%  { opacity: 0.85; }
          100% { transform: translate(-48px, 340px) rotate(9deg); opacity: 0.3; }
        }
        @keyframes floatUp {
          0%   { transform: translateY(0) translateX(0); opacity: 0; }
          25%  { opacity: 0.8; }
          100% { transform: translateY(-130px) translateX(14px); opacity: 0; }
        }
      `}</style>
      {/* Header */}
      <header className="border-b border-slate-800 bg-slate-900/80 backdrop-blur-md sticky top-0 z-40 px-4 py-3 md:px-8 flex flex-col sm:flex-row items-center justify-between gap-4">
        <div className="flex items-center gap-3">
          <div className="p-2 bg-gradient-to-tr from-amber-500 to-orange-600 rounded-xl shadow-lg shadow-orange-500/20">
            <Sun className="w-6 h-6 text-white" />
          </div>
          <div>
            <h1 className="text-xl font-bold tracking-tight bg-gradient-to-r from-amber-400 via-orange-400 to-teal-400 bg-clip-text text-transparent">
              {t('title')}
            </h1>
            <p className="text-xs text-slate-400">{t('subtitle')}</p>
          </div>
        </div>

        {/* Global Controls: Tabs & Language Selector */}
        <div className="flex items-center gap-3 flex-wrap">

            </h2>
            <p className="text-xs text-slate-400 mt-2 leading-relaxed">{t('helpIntro')}</p>

            <div className="mt-4 space-y-3">
              {TRANSLATIONS[lang].helpItems.map((item, idx) => (
                <div key={idx} className="p-3 bg-slate-950 rounded-xl border border-slate-800">

// Very coarse continent outlines as [longitude, latitude] rings — schematic shapes
// so students can recognise "their" part of the world on the globe. Not survey data!
const CONTINENTS = [
  // North America
  [[-166, 66], [-140, 70], [-110, 73], [-85, 70], [-75, 60], [-55, 50], [-65, 45], [-70, 42], [-76, 35], [-81, 26], [-90, 29], [-97, 26], [-105, 20], [-88, 13], [-83, 9], [-92, 15], [-105, 23], [-117, 33], [-125, 40], [-125, 49], [-140, 60], [-152, 60]],
  // South America
  [[-75, 10], [-62, 10], [-52, 4], [-35, -6], [-39, -14], [-48, -26], [-57, -34], [-65, -40], [-68, -50], [-72, -54], [-71, -45], [-73, -35], [-70, -20], [-77, -10], [-80, 0]],
  // Africa
  [[-6, 35], [10, 37], [20, 33], [32, 31], [43, 11], [51, 10], [40, -5], [35, -20], [30, -30], [20, -35], [15, -30], [12, -18], [9, -1], [-8, 5], [-17, 15], [-17, 21]],
  // Eurasia (Europe + Asia, with the Indian & Indochinese peninsulas)
  [[-10, 36], [-8, 44], [0, 47], [8, 54], [5, 60], [12, 65], [25, 71], [45, 68], [70, 72], [100, 76], [130, 72], [160, 68], [178, 65], [160, 60], [142, 52], [130, 42], [122, 37], [120, 26], [108, 15], [105, 9], [100, 6], [98, 12], [96, 16], [88, 22], [85, 18], [80, 9], [73, 18], [67, 24], [60, 25], [57, 20], [50, 13], [43, 12], [42, 16], [34, 28], [26, 37], [18, 40], [10, 44], [0, 43]],
  // Australia
  [[114, -22], [122, -14], [132, -11], [142, -11], [146, -15], [149, -21], [153, -28], [150, -37], [140, -38], [131, -32], [124, -33], [114, -35], [113, -26]],
  // Greenland
  [[-45, 60], [-30, 68], [-20, 70], [-25, 78], [-40, 80], [-55, 76], [-53, 70]]
];

function SeasonGlobe({
  latitude,
  onSelectLatitude,
  declination,
  axialTilt,
  timeOfDay,
  northSeason,
  southSeason,
  legendSunlight,
  legendNight
}) {
  const containerRef = useRef(null);
  const [isDragging, setIsDragging] = useState(false);
  const rad = Math.PI / 180;

  // Orthographic side view: sun fixed on the left, globe leaning with the season.
  const R = 92;           // globe radius (viewBox units)
  const CX = 140, CY = 115; // globe center in the 260x230 viewBox

  const SEASON_BAND_COLORS = {
    Winter: "#cbd5e1", // icy slate
    Spring: "#4ade80", // fresh green
    Summer: "#15803d", // deep green
    Autumn: "#d97706"  // amber
  };

  // Season colors fade toward neutral green as tilt approaches 0 (no tilt = no seasons)
  const seasonStrength = Math.min(1, axialTilt / 23.5);

  // Latitude circle -> vertical position on the disk (orthographic projection)
  const yOf = (latDeg) => -R * Math.sin(latDeg * rad);

  const handleInteraction = (e) => {
    if (!containerRef.current) return;
    const rect = containerRef.current.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    // Pixel coords -> viewBox coords relative to the globe center
    const vx = ((clientX - rect.left) / rect.width) * 260 - CX;
    const vy = ((clientY - rect.top) / rect.height) * 230 - CY;
    // Undo the seasonal lean so the drag lands on the true latitude
    const a = -declination * rad;
    const yLocal = -vx * Math.sin(a) + vy * Math.cos(a);
    const lat = Math.asin(Math.max(-1, Math.min(1, -yLocal / R))) / rad;
    onSelectLatitude(Math.round(Math.max(-90, Math.min(90, lat)) * 2) / 2);
  };

  const handleMouseDown = (e) => {
    setIsDragging(true);
    handleInteraction(e);
  };

  const handleMouseMove = (e) => {
    if (isDragging) {
      handleInteraction(e);
    }
  };

  const handleMouseUpOrLeave = () => {
    setIsDragging(false);
  };

  // A few meridians that slide with the time of day — a cheap "spinning Earth" feel
  const spinDeg = timeOfDay * 15;
  const meridianRx = [0, 45, 90, 135].map((base) => {
    const lon = (base + spinDeg) % 180;
    return R * Math.abs(Math.sin(lon * rad));
  });

  // Orthographic projection of the continent outlines, spinning with the time of day.
  // Back-hemisphere vertices are squashed onto the limb (rim) instead of dropped, so
  // every shape deforms continuously while the globe spins — no popping or fold-over.
  const landPaths = useMemo(() => {
    const paths = [];
    for (const ring of CONTINENTS) {
      let anyVisible = false;
      const pts = ring.map(([lon, lat]) => {
        const lonR = (lon + spinDeg) * rad;
        const latR = lat * rad;
        let x = R * Math.cos(latR) * Math.sin(lonR);
        let y = -R * Math.sin(latR);
        if (Math.cos(latR) * Math.cos(lonR) > 0) {
          anyVisible = true;
        } else {
          // Behind the globe: push the point out to the rim along its own direction
          const len = Math.sqrt(x * x + y * y) || 1;
          x = (x / len) * R;
          y = (y / len) * R;
        }
        return x.toFixed(1) + ',' + y.toFixed(1);
      });
      if (anyVisible) paths.push('M ' + pts.join(' L ') + ' Z');
    }
    return paths.join(' ');
  }, [spinDeg]);

  const markerY = yOf(latitude);
  const markerHalfWidth = Math.sqrt(Math.max(0, R * R - markerY * markerY));

  // Climate bands, pole to pole. Temperate bands carry the hemisphere's season color.
  const bands = [
    { from: 90, to: 66.5, fill: "#e2e8f0", seasonal: false },                      // N polar cap
    { from: 66.5, to: 23.5, fill: SEASON_BAND_COLORS[northSeason], seasonal: true },
    { from: 23.5, to: -23.5, fill: "#16a34a", seasonal: false },                   // tropics
    { from: -23.5, to: -66.5, fill: SEASON_BAND_COLORS[southSeason], seasonal: true },
    { from: -66.5, to: -90, fill: "#e2e8f0", seasonal: false }                     // S polar cap
  ];

  return (
    <div
      ref={containerRef}
      className="relative w-full bg-slate-950 rounded-xl border border-slate-800 overflow-hidden cursor-ns-resize select-none"
      onMouseDown={handleMouseDown}
      onMouseMove={handleMouseMove}
      onMouseUp={handleMouseUpOrLeave}
      onMouseLeave={handleMouseUpOrLeave}
      onTouchStart={handleMouseDown}
      onTouchMove={handleMouseMove}
      onTouchEnd={handleMouseUpOrLeave}
    >
      {/* Star speckle backdrop */}
      <div className="absolute inset-0 bg-[radial-gradient(#1e293b_1px,transparent_1px)] [background-size:18px_18px] opacity-40" />

      <svg className="w-full" viewBox="0 0 260 230">
        <defs>
          <clipPath id="seasonGlobeClip">
            <circle cx="0" cy="0" r={R} />
          </clipPath>
          <radialGradient id="seasonGlobeSunGlow">
            <stop offset="0%" stopColor="#fbbf24" stopOpacity="0.85" />
            <stop offset="100%" stopColor="#fbbf24" stopOpacity="0" />
          </radialGradient>
        </defs>

        {/* Sun on the left with a soft pulsing glow */}
        <g className="animate-pulse">
          <circle cx="8" cy={CY} r="30" fill="url(#seasonGlobeSunGlow)" />
        </g>
        <circle cx="8" cy={CY} r="12" fill="#fcd34d" />
        {[-26, 0, 26].map((dy) => (
          <line
            key={dy}
            x1="24"
            y1={CY + dy}
            x2={CX - R - 4}
            y2={CY + dy}
            stroke="#fbbf24"
            strokeWidth="1"
            strokeDasharray="4,4"
            opacity="0.35"
          />
        ))}

        {/* Globe, leaning with the season (lean angle = solar declination) */}
        <g transform={`translate(${CX}, ${CY}) rotate(${-declination})`}>
          <circle r={R} fill="#155e75" />

          <g clipPath="url(#seasonGlobeClip)">
            {/* Neutral base for the temperate bands (what a tilt-less Earth would show) */}
            {bands.map((band, i) => (
              <rect
                key={`base-${i}`}
                x={-R}
                y={yOf(band.from)}
                width={2 * R}
                height={yOf(band.to) - yOf(band.from)}
                fill={band.seasonal ? "#059669" : band.fill}
                opacity="0.92"
              />
            ))}
            {/* Season color overlays fade in as axial tilt grows */}
            {bands.filter((b) => b.seasonal).map((band, i) => (
              <rect
                key={`season-${i}`}
                x={-R}
                y={yOf(band.from)}
                width={2 * R}
                height={yOf(band.to) - yOf(band.from)}
                fill={band.fill}
                opacity={0.92 * seasonStrength}
                className="transition-opacity duration-500"
              />
            ))}

            {/* Continent silhouettes (schematic) — help students find their home region */}
            {landPaths && (
              <path d={landPaths} fill="#0f172a" opacity="0.4" stroke="#0f172a" strokeWidth="0.5" strokeLinejoin="round" />
            )}

            {/* Graticule: equator, tropics, polar circles */}
            <line x1={-R} y1="0" x2={R} y2="0" stroke="#f59e0b" strokeWidth="1" strokeDasharray="4,3" opacity="0.75" />
            {[23.5, -23.5].map((l) => (
              <line key={l} x1={-R} y1={yOf(l)} x2={R} y2={yOf(l)} stroke="#fde68a" strokeWidth="0.75" strokeDasharray="3,3" opacity="0.3" />
            ))}
            {[66.5, -66.5].map((l) => (
              <line key={l} x1={-R} y1={yOf(l)} x2={R} y2={yOf(l)} stroke="#bae6fd" strokeWidth="0.75" strokeDasharray="3,3" opacity="0.35" />
            ))}

            {/* Sliding meridians (driven by time of day) */}
            {meridianRx.map((rx, i) =>
              rx > 2 ? (
                <ellipse key={i} cx="0" cy="0" rx={rx} ry={R} fill="none" stroke="#0f172a" strokeWidth="0.75" opacity="0.28" />
              ) : null
            )}

            {/* Selected latitude line */}
            <line
              x1={-markerHalfWidth}
              y1={markerY}
              x2={markerHalfWidth}
              y2={markerY}
              stroke="#2dd4bf"
              strokeWidth="1.5"
              opacity="0.9"
            />
          </g>

          {/* Axis of rotation */}
          <line x1="0" y1={-R - 13} x2="0" y2={R + 13} stroke="#10b981" strokeWidth="2" />
          <text x="5" y={-R - 5} fill="#10b981" fontSize="9" fontFamily="monospace" fontWeight="bold">N</text>
          <text x="5" y={R + 12} fill="#10b981" fontSize="9" fontFamily="monospace" fontWeight="bold">S</text>

          {/* "You are here" marker */}
          <circle cx="0" cy={markerY} r="7" fill="none" stroke="#f43f5e" strokeWidth="1.5" className="animate-pulse" />
          <circle cx="0" cy={markerY} r="4" fill="#f43f5e" stroke="#ffffff" strokeWidth="1.5" />
        </g>

        {/* Night side: the half of Earth facing away from the Sun */}
        <path
          d={`M ${CX} ${CY - R} A ${R} ${R} 0 0 1 ${CX} ${CY + R} Z`}
          fill="#020617"
          opacity="0.6"
        />
      </svg>

      {/* Legend */}
      <div className="absolute bottom-1.5 left-2.5 right-2.5 flex justify-between text-[9px] font-semibold pointer-events-none">
        <span className="text-amber-300/90">☀ {legendSunlight}</span>
        <span className="text-slate-400">{legendNight} ☾</span>
      </div>
    </div>
  );
}

// Linear blend between two colors (accepts "#rrggbb" or "rgb(r, g, b)")
function parseColor(c) {
  if (c.startsWith('#')) {
    return [parseInt(c.slice(1, 3), 16), parseInt(c.slice(3, 5), 16), parseInt(c.slice(5, 7), 16)];
  }
  return c.match(/\d+/g).map(Number);
}
function mixColor(a, b, t) {
  const ca = parseColor(a), cb = parseColor(b);
  const ch = (i) => Math.round(ca[i] + (cb[i] - ca[i]) * t);
  return `rgb(${ch(0)}, ${ch(1)}, ${ch(2)})`;
}

// Sky color stops keyed on the sun's elevation angle (degrees above the horizon).
// Interpolating between them gives a perfectly smooth night → dawn → day cycle,
// and it works at the poles too (midnight sun = bright sky at 00:00).
const SKY_STOPS = [
  { e: -18, top: "#020617", mid: "#0f172a", bot: "#1e1b4b" }, // deep night
  { e: -6,  top: "#1e1b4b", mid: "#4c1d95", bot: "#9a3412" }, // early twilight
  { e: 0,   top: "#312e81", mid: "#c2410c", bot: "#fbbf24" }, // sun on the horizon
  { e: 10,  top: "#0c4a6e", mid: "#0284c7", bot: "#fde68a" }, // golden hour
  { e: 35,  top: "#0ea5e9", mid: "#7dd3fc", bot: "#e0f2fe" }  // full daylight
];

function LandscapeView({ seasonKey, translatedSeason, temp, time, latitude, declination, weatherIcon, solarElevation, dayLength }) {
  // --- Sky: continuous gradient from the sun's real elevation ---
  const e = solarElevation;
  const skyColors = (() => {
    if (e <= SKY_STOPS[0].e) return SKY_STOPS[0];
    if (e >= SKY_STOPS[SKY_STOPS.length - 1].e) return SKY_STOPS[SKY_STOPS.length - 1];
    for (let i = 0; i < SKY_STOPS.length - 1; i++) {
      const a = SKY_STOPS[i], b = SKY_STOPS[i + 1];
      if (e >= a.e && e <= b.e) {
        const t = (e - a.e) / (b.e - a.e);
        return { top: mixColor(a.top, b.top, t), mid: mixColor(a.mid, b.mid, t), bot: mixColor(a.bot, b.bot, t) };
      }
    }
    return SKY_STOPS[SKY_STOPS.length - 1];
  })();
  // Winter days get a paler, colder-looking sky
  const winterize = (col) => (seasonKey === "Winter" && e > 0 ? mixColor(col, '#cbd5e1', 0.35 * Math.min(1, e / 35)) : col);
  const skyStyle = {
    background: `linear-gradient(to bottom, ${skyColors.top}, ${winterize(skyColors.mid)}, ${winterize(skyColors.bot)})`
  };

  // --- Sun & moon positions ---
  // Left edge = east, right edge = west. The sun rises at the LEFT horizon at
  // sunrise, arcs a half-circle peaking at solar noon (center), and sets at the
  // RIGHT horizon — its horizontal travel is mapped across the daylight window.
  // During polar day (24h daylight) there is no sunrise, so it circles the whole
  // sky instead, dipping lowest at midnight. Vertical position is always the REAL
  // elevation angle (horizon ≈ 62% down the frame, zenith ≈ 8%); bodies below the
  // horizon sink behind the terrain, which is painted on top of them.
  const HORIZON = 62, ZENITH = 8;
  const yFromElevation = (elev) => HORIZON - (elev / 90) * (HORIZON - ZENITH);
  const nightLength = 24 - dayLength;
  const sunrise = 12 - dayLength / 2;
  const sunset = 12 + dayLength / 2;

  let sunX;
  if (dayLength >= 23.9) {
    // Polar day: the sun never sets — it sweeps around, low at midnight, high at noon
    sunX = (time / 24) * 100;
  } else if (dayLength <= 0.1) {
    sunX = -20; // Polar night: sun stays hidden
  } else {
    // Rise at the left edge, set at the right edge (drifts offscreen outside the window)
    sunX = ((time - sunrise) / dayLength) * 100;
  }
  const sunPos = {
    x: Math.max(-20, Math.min(120, sunX)),
    y: yFromElevation(e),
    opacity: Math.max(0, Math.min(1, (e + 8) / 10))
  };

  // The moon arcs opposite the sun (schematic, like a full moon night): it rises
  // in the east (LEFT) at sunset and crosses its arc over the night window.
  // The signed phase keeps it parked just off the LEFT edge before moonrise, so
  // the wrap from "set right" back to "waiting left" happens around midday,
  // while the moon is fully invisible — it can never appear to rise from the west.
  const moonElev = -e;
  let moonX;
  if (nightLength <= 0.1) {
    moonX = -20; // Polar day: no night, moon stays hidden
  } else {
    const phase = ((time - sunset + 12 + 24) % 24) - 12; // hours since sunset, in [-12, 12)
    moonX = (phase / nightLength) * 100;
  }
  const moonPos = {
    x: Math.max(-20, Math.min(120, moonX)),
    y: yFromElevation(moonElev),
    opacity: Math.max(0, Math.min(1, (moonElev + 8) / 10)) * 0.95
  };
  // Stars fade in smoothly as the sun drops below the horizon
  const starOpacity = Math.max(0, Math.min(1, (-e - 2) / 10)) * 0.85;
  // Warm glow hugging the horizon around sunrise/sunset
  const duskGlow = Math.max(0, 1 - Math.abs(e) / 10);

  const getFoliageColors = () => {
    switch (seasonKey) {
      case "Spring":
        return { leaf: "fill-emerald-400", subLeaf: "fill-green-300", ground: "fill-emerald-700" };
      case "Summer":
      case "WetHigh":
        return { leaf: "fill-emerald-600", subLeaf: "fill-teal-500", ground: "fill-green-800" };
      case "Autumn":
      case "DryLow":
        return { leaf: "fill-amber-600", subLeaf: "fill-orange-500", ground: "fill-amber-800" };
      case "Winter":
        return { leaf: "fill-slate-700", subLeaf: "fill-slate-600", ground: "fill-slate-100" };
      default:
        return { leaf: "fill-emerald-500", subLeaf: "fill-green-400", ground: "fill-green-700" };
    }
  };

  const colors = getFoliageColors();

  return (
    <div
      className="w-full h-64 md:h-80 rounded-xl relative overflow-hidden border border-slate-800"
      style={skyStyle}
    >
      {/* Stars fade in smoothly as the sky darkens */}
      <div className="absolute inset-0 pointer-events-none transition-opacity duration-700" style={{ opacity: starOpacity }}>
        <div className="absolute w-1 h-1 bg-white rounded-full top-10 left-10 animate-ping" />
        <div className="absolute w-1.5 h-1.5 bg-white rounded-full top-24 left-1/3 opacity-70" />
        <div className="absolute w-1 h-1 bg-white rounded-full top-12 left-2/3" />
        <div className="absolute w-1 h-1 bg-white rounded-full top-36 left-4/5 animate-pulse" />
        <div className="absolute w-0.5 h-0.5 bg-white rounded-full top-48 left-1/4" />
        <div className="absolute w-1 h-1 bg-white rounded-full top-6 left-1/2 opacity-60" />
        <div className="absolute w-0.5 h-0.5 bg-white rounded-full top-28 left-[15%] opacity-80" />
      </div>

      {/* Warm glow hugging the horizon at sunrise/sunset */}
      {duskGlow > 0 && (
        <div
          className="absolute pointer-events-none rounded-full blur-2xl"
          style={{
            left: `${sunPos.x}%`,
            top: '58%',
            width: '55%',
            height: '30%',
            transform: 'translate(-50%, -50%)',
            background: 'radial-gradient(ellipse, rgba(251,146,60,0.55) 0%, rgba(244,63,94,0.25) 55%, transparent 75%)',
            opacity: duskGlow
          }}
        />
      )}

      {/* Sun: rides its real elevation angle, sinks behind the hills */}
      <div
        className="absolute transition-all duration-500 flex items-center justify-center pointer-events-none"
        style={{
          left: `${sunPos.x}%`,
          top: `${sunPos.y}%`,
          transform: 'translate(-50%, -50%)',
          opacity: sunPos.opacity
        }}
      >
        <div className="absolute w-24 h-24 bg-amber-400/20 rounded-full blur-xl" />
        <div className="absolute w-16 h-16 bg-orange-300/30 rounded-full blur-md" />
        <div className="w-10 h-10 rounded-full bg-gradient-to-r from-amber-200 to-amber-400 shadow-xl shadow-amber-400/50" />
      </div>

      {/* Moon: arcs opposite the sun through the night */}
      <div
        className="absolute transition-all duration-500 flex items-center justify-center pointer-events-none"
        style={{
          left: `${moonPos.x}%`,
          top: `${moonPos.y}%`,
          transform: 'translate(-50%, -50%)',
          opacity: moonPos.opacity
        }}
      >
        <div className="absolute w-16 h-16 bg-slate-200/10 rounded-full blur-lg" />
        <div className="relative w-7 h-7 rounded-full bg-slate-100 shadow-lg shadow-slate-200/40 overflow-hidden">
          <div className="absolute w-6 h-6 rounded-full bg-slate-300/60 -right-2 -top-1.5" />
          <div className="absolute w-1.5 h-1.5 rounded-full bg-slate-400/50 left-1.5 top-3.5" />
          <div className="absolute w-1 h-1 rounded-full bg-slate-400/40 left-3.5 top-1.5" />
        </div>
      </div>

      {/* Clouds drift gently side to side */}
      <div
        className="absolute top-8 left-0 right-0 h-12 flex justify-around pointer-events-none opacity-40"
        style={{ animation: 'drift 45s ease-in-out infinite' }}
      >
        <div className="w-24 h-8 bg-white/70 rounded-full blur-sm animate-pulse" />
        <div className="w-32 h-10 bg-white/80 rounded-full blur-sm" />
      </div>

      {/* Falling snow: round flakes drifting side to side (freezing temperatures) */}
      {temp < 0 && (
        <div className="absolute inset-0 pointer-events-none overflow-hidden">
          {[4, 14, 25, 37, 48, 58, 69, 79, 88, 96].map((left, i) => (
            <div
              key={i}
              className={`absolute top-0 rounded-full bg-white ${i % 3 === 0 ? 'w-2 h-2 opacity-90' : i % 3 === 1 ? 'w-1.5 h-1.5 opacity-75' : 'w-1 h-1 opacity-60'}`}
              style={{
                left: `${left}%`,
                animation: `fallSnow ${5 + (i % 4) * 1.3}s linear infinite`,
                animationDelay: `${(i * 0.9) % 5}s`
              }}
            />
          ))}
        </div>
      )}

      {/* Rain streaks (only while the weather model says it's raining) */}
      {temp >= 0 && weatherIcon && weatherIcon.includes('rain') && (
        <div className="absolute inset-0 pointer-events-none overflow-hidden">
          {[8, 22, 38, 55, 70, 84, 94].map((left, i) => (
            <div
              key={i}
              className="absolute top-0 w-0.5 h-8 rounded-full bg-gradient-to-b from-transparent via-sky-300/70 to-sky-200/80"
              style={{
                left: `${left}%`,
                animation: `rainFall ${0.8 + (i % 3) * 0.25}s linear infinite`,
                animationDelay: `${i * 0.17}s`
              }}
            />
          ))}
        </div>
      )}

      {/* Drifting autumn leaves */}
      {temp >= 0 && (seasonKey === "Autumn" || seasonKey === "DryLow") && (
        <div className="absolute inset-0 pointer-events-none overflow-hidden">
          {[12, 30, 52, 68, 86].map((left, i) => (
            <div
              key={i}
              className={`absolute top-0 w-1.5 h-1.5 rounded-sm ${i % 2 === 0 ? 'bg-amber-500' : 'bg-orange-400'}`}
              style={{
                left: `${left}%`,
                animation: `fallLeaf ${7 + (i % 3) * 2}s linear infinite`,
                animationDelay: `${i * 1.4}s`
              }}
            />
          ))}
        </div>
      )}

      {/* Floating pollen / light motes on warm bright days */}
      {temp >= 10 && solarElevation > 5 && (seasonKey === "Spring" || seasonKey === "Summer" || seasonKey === "WetHigh") && (
        <div className="absolute inset-0 pointer-events-none overflow-hidden">
          {[18, 42, 63, 80].map((left, i) => (
            <div
              key={i}
              className="absolute bottom-14 w-1 h-1 rounded-full bg-amber-100/70"
              style={{
                left: `${left}%`,
                animation: `floatUp ${5.5 + i * 1.2}s ease-in infinite`,
                animationDelay: `${i * 1.1}s`
              }}
            />
          ))}
        </div>
      )}

      <svg className="absolute bottom-0 w-full h-3/4" viewBox="0 0 1000 300" preserveAspectRatio="none">
        <path 
          d="M 0 250 Q 250 120 500 230 T 1000 220 L 1000 300 L 0 300 Z" 
          className={seasonKey === "Winter" ? "fill-slate-400/60" : "fill-emerald-900/60"} 
        />
        <path 
          d="M 0 260 Q 350 160 700 250 T 1000 240 L 1000 300 L 0 300 Z" 
          className={seasonKey === "Winter" ? "fill-slate-300/70" : "fill-emerald-800/80"} 
        />
        <path 
          d="M 0 270 Q 200 200 600 260 T 1000 260 L 1000 300 L 0 300 Z" 
          className={colors.ground} 
        />

        {seasonKey !== "Winter" ? (
          <g>
            <rect x="180" y="210" width="16" height="70" className="fill-amber-950" />
            <circle cx="188" cy="180" r="45" className={colors.leaf} />
            <circle cx="160" cy="165" r="30" className={colors.subLeaf} />
            <circle cx="215" cy="170" r="30" className={colors.subLeaf} />
          </g>
        ) : (
          <g>
            <path d="M 188 280 L 188 190 M 188 230 Q 160 210 150 190 M 188 210 Q 210 190 220 180 M 188 245 Q 210 230 225 210 M 188 220 Q 170 200 160 180" stroke="#451a03" strokeWidth="4" fill="none" />
          </g>
        )}

        <g>
          <rect x="750" y="190" width="14" height="90" className="fill-amber-950" />
          <polygon points="757,100 710,180 804,180" className={seasonKey === "Winter" ? "fill-emerald-950" : "fill-emerald-700"} />
          <polygon points="757,130 720,200 794,200" className={seasonKey === "Winter" ? "fill-emerald-900" : "fill-emerald-600"} />
          <polygon points="757,160 730,220 784,220" className={seasonKey === "Winter" ? "fill-teal-950" : "fill-teal-700"} />
        </g>

        {seasonKey === "Winter" && (
          <g>
            <path d="M 0 270 Q 200 200 600 260 T 1000 260 L 1000 275 L 0 275 Z" className="fill-slate-50/90" />
            <polygon points="757,100 740,130 774,130" className="fill-slate-50" />
            <polygon points="757,130 735,160 779,160" className="fill-slate-100" />
          </g>
        )}
      </svg>

      <div className="absolute bottom-4 left-4 bg-slate-900/80 backdrop-blur border border-slate-700/50 px-3 py-1.5 rounded-lg flex items-center gap-1.5">
        <Sun className="w-3.5 h-3.5 text-amber-400" />
        <span className="text-xs font-mono font-semibold text-slate-200">
          Lat {Math.abs(latitude).toFixed(0)}°{latitude >= 0 ? 'N' : 'S'} | {translatedSeason}
        </span>
      </div>
    </div>
  );
}

function SolarEarthAngleVisual({ latitude, declination, tilt, lang }) {
  const rad = Math.PI / 180;

  return (
    <svg className="w-full h-full max-w-sm" viewBox="0 0 300 200">
      <g stroke="#e11d48" strokeWidth="1" strokeDasharray="3,3" opacity="0.6">
        <line x1="10" y1="50" x2="110" y2="50" />
        <line x1="10" y1="100" x2="110" y2="100" strokeWidth="1.5" strokeDasharray="none" />
        <line x1="10" y1="150" x2="110" y2="150" />
      </g>
      <text x="25" y="40" fill="#fb7185" className="text-[10px] uppercase font-bold tracking-wider">
        {lang === 'en' ? 'Incoming Solar Rays' : 'รังสีตกกระทบจากดวงอาทิตย์'}
      </text>

      <g transform="translate(190, 100)">
        <circle cx="0" cy="0" r="54" fill="none" stroke="#38bdf8" strokeWidth="1.5" opacity="0.4" strokeDasharray="3,3" />
        <circle cx="0" cy="0" r="45" className="fill-slate-800 stroke-slate-600" strokeWidth="2" />
        <path d="M 0 -45 A 45 45 0 0 1 0 45 Z" className="fill-slate-900" opacity="0.5" />

        <g transform={`rotate(${tilt})`}>
          <line x1="0" y1="-65" x2="0" y2="65" stroke="#10b981" strokeWidth="2.5" />
          <text x="5" y="-55" fill="#10b981" className="text-[9px] font-mono font-bold">
            {lang === 'en' ? 'N. Pole' : 'ขั้วโลกเหนือ'}
          </text>
          <text x="5" y="60" fill="#10b981" className="text-[9px] font-mono font-bold">
            {lang === 'en' ? 'S. Pole' : 'ขั้วโลกใต้'}
          </text>

          <line x1="-55" y1="0" x2="55" y2="0" stroke="#f59e0b" strokeWidth="1.5" strokeDasharray="2,2" />
          <text x="40" y="-4" fill="#f59e0b" className="text-[8px] font-bold">
            {lang === 'en' ? 'Equator' : 'เส้นศูนย์สูตร'}
          </text>
        </g>

        <g transform={`rotate(${tilt})`}>
          {(() => {
            const angleRad = -latitude * rad;
            const x = 45 * Math.cos(angleRad);
            const y = 45 * Math.sin(angleRad);
            return (
              <g>
                <line 
                  x1={x - 20 * Math.sin(angleRad)} 
                  y1={y + 20 * Math.cos(angleRad)} 
                  x2={x + 20 * Math.sin(angleRad)} 
                  y2={y - 20 * Math.cos(angleRad)} 
                  stroke="#38bdf8" 
                  strokeWidth="2" 
                />
                <circle cx={x} cy={y} r="4" className="fill-rose-500 animate-pulse" />
                <line x1={x} y1={y} x2={x - 40} y2={y} stroke="#f43f5e" strokeWidth="1.5" />
                <text x={x + 8} y={y + 4} fill="#f43f5e" className="text-[9px] font-bold">
                  {lang === 'en' ? 'You' : 'คุณ'}
                </text>
              </g>
            );
          })()}
        </g>
      </g>
    </svg>
  );
}

createRoot(document.getElementById('root')).render(React.createElement(App));


  </script>
